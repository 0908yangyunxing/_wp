<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網誌管理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif;
      background: #f0f2f5; color: #1a1a2e; padding: 30px 20px;
    }
    .container { max-width: 860px; margin: 0 auto; }
    .header-bar {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px;
    }
    .header-bar h1 { font-size: 26px; }
    .btn {
      padding: 10px 22px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 600; text-decoration: none; display: inline-flex;
      align-items: center; gap: 6px; transition: all 0.2s;
    }
    .btn-back { background: #667eea; color: white; }
    .btn-back:hover { background: #5a6fd6; }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover { background: #5a6fd6; }
    .btn-success { background: #10b981; color: white; }
    .btn-success:hover { background: #059669; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .card {
      background: white; border-radius: 12px; padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 24px;
    }
    .card h2 { font-size: 18px; margin-bottom: 16px; color: #444; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #555; }
    .form-control {
      width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .form-control:focus { border-color: #667eea; }
    textarea.form-control { min-height: 200px; resize: vertical; }
    .form-hint { font-size: 12px; color: #999; margin-top: 4px; }
    .post-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0; border-bottom: 1px solid #f0f0f0;
    }
    .post-item:last-child { border-bottom: none; }
    .post-info h3 { font-size: 16px; margin-bottom: 4px; }
    .post-info .meta { font-size: 13px; color: #888; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .post-info .tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .post-info .tag {
      display: inline-block; padding: 1px 8px; border-radius: 8px;
      font-size: 11px; background: #eef0ff; color: #667eea;
    }
    .post-actions { display: flex; gap: 8px; }
    .toast {
      position: fixed; top: 20px; right: 20px; padding: 14px 24px; border-radius: 10px;
      color: white; font-weight: 600; font-size: 14px; z-index: 1000;
      transform: translateX(120%); transition: transform 0.3s ease; max-width: 360px;
    }
    .toast.show { transform: translateX(0); }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 999; justify-content: center; align-items: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 16px; padding: 28px; width: 90%; max-width: 600px;
      max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 20px; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
    .empty-state { text-align: center; padding: 40px 20px; color: #999; }
    .empty-state p { font-size: 15px; }
    @media (max-width: 640px) {
      .header-bar { flex-direction: column; gap: 12px; text-align: center; }
      .post-item { flex-direction: column; gap: 12px; align-items: flex-start; }
      .post-actions { width: 100%; }
      .post-actions .btn { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-bar">
      <h1>⚙ 管理文章</h1>
      <a href="/" class="btn btn-back">← 返回網誌</a>
    </div>

    <div class="card">
      <h2>✏ 新增文章</h2>
      <div class="form-group">
        <label>標題</label>
        <input type="text" id="title" class="form-control" placeholder="輸入文章標題">
      </div>
      <div class="form-group">
        <label>內容 (支援 Markdown)</label>
        <textarea id="content" class="form-control" placeholder="使用 Markdown 語法撰寫內容..."></textarea>
      </div>
      <div class="form-group">
        <label>標籤</label>
        <input type="text" id="tags" class="form-control" placeholder="以逗號分隔，例如：科技,生活,教學">
        <div class="form-hint">多個標籤請用逗號分隔</div>
      </div>
      <button class="btn btn-success" onclick="createPost()">📝 發布文章</button>
    </div>

    <div class="card">
      <h2>📋 文章列表</h2>
      <div id="postsList"></div>
    </div>
  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h2>✏ 編輯文章</h2>
      <div class="form-group">
        <label>標題</label>
        <input type="text" id="editTitle" class="form-control">
      </div>
      <div class="form-group">
        <label>內容 (支援 Markdown)</label>
        <textarea id="editContent" class="form-control" style="min-height:250px;"></textarea>
      </div>
      <div class="form-group">
        <label>標籤</label>
        <input type="text" id="editTags" class="form-control" placeholder="以逗號分隔，例如：科技,生活,教學">
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger" onclick="closeEditModal()">取消</button>
        <button class="btn btn-primary" id="saveEditBtn" onclick="saveEdit()">💾 儲存</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let editingId = null;

    async function loadPosts() {
      const res = await fetch('/api/posts?limit=100');
      const data = await res.json();
      const container = document.getElementById('postsList');

      if (data.posts.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>尚無文章，立即發布第一篇吧！</p></div>';
        return;
      }

      container.innerHTML = data.posts.map(post => `
        <div class="post-item">
          <div class="post-info">
            <h3>${escapeHtml(post.title)}</h3>
            <div class="meta">
              <span>📅 ${new Date(post.created_at).toLocaleString('zh-TW')}</span>
              <span class="tags">${(post.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</span>
            </div>
          </div>
          <div class="post-actions">
            <button class="btn btn-primary btn-sm" onclick="openEditModal(${post.id})">✏ 編輯</button>
            <button class="btn btn-danger btn-sm" onclick="deletePost(${post.id})">🗑 刪除</button>
          </div>
        </div>
      `).join('');
    }

    async function createPost() {
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      const tags = document.getElementById('tags').value.trim();

      if (!title) { showToast('請輸入標題', 'error'); return; }
      if (!content) { showToast('請輸入內容', 'error'); return; }

      try {
        const res = await fetch('/api/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content, tags })
        });

        if (!res.ok) {
          const err = await res.json();
          showToast(err.error, 'error');
          return;
        }

        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
        document.getElementById('tags').value = '';
        showToast('文章發布成功！', 'success');
        loadPosts();
      } catch (e) {
        showToast('發布失敗，請稍後再試', 'error');
      }
    }

    async function openEditModal(id) {
      editingId = id;
      const res = await fetch('/api/posts/' + id);
      const post = await res.json();

      document.getElementById('editTitle').value = post.title;
      document.getElementById('editContent').value = post.content;
      document.getElementById('editTags').value = (post.tags || []).join(',');
      document.getElementById('editModal').classList.add('show');
    }

    function closeEditModal() {
      editingId = null;
      document.getElementById('editModal').classList.remove('show');
    }

    async function saveEdit() {
      const title = document.getElementById('editTitle').value.trim();
      const content = document.getElementById('editContent').value.trim();
      const tags = document.getElementById('editTags').value.trim();

      if (!title) { showToast('請輸入標題', 'error'); return; }
      if (!content) { showToast('請輸入內容', 'error'); return; }

      try {
        const res = await fetch('/api/posts/' + editingId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content, tags })
        });

        if (!res.ok) {
          const err = await res.json();
          showToast(err.error, 'error');
          return;
        }

        showToast('文章更新成功！', 'success');
        closeEditModal();
        loadPosts();
      } catch (e) {
        showToast('更新失敗，請稍後再試', 'error');
      }
    }

    async function deletePost(id) {
      if (!confirm('確定要刪除這篇文章嗎？此操作無法復原。')) return;
      try {
        const res = await fetch('/api/posts/' + id, { method: 'DELETE' });
        if (!res.ok) {
          const err = await res.json();
          showToast(err.error, 'error');
          return;
        }
        showToast('文章已刪除', 'success');
        loadPosts();
      } catch (e) {
        showToast('刪除失敗，請稍後再試', 'error');
      }
    }

    let toastTimer;
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) closeEditModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeEditModal();
    });

    loadPosts();
  </script>
</body>
</html>
